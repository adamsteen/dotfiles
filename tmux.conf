set -g default-terminal "tmux-256color"

# Force zsh as the shell for new panes regardless of the login shell.
# Needed on the Linux VDI where the default shell is bash (and can't be
# changed) but tmux panes should still get zsh. Last successful match
# wins, so a homebrew zsh overrides the system /bin/zsh.
if-shell '[ -x /bin/zsh ]'                            'set -g default-shell /bin/zsh'
if-shell '[ -x /usr/bin/zsh ]'                        'set -g default-shell /usr/bin/zsh'
if-shell '[ -x /usr/local/bin/zsh ]'                  'set -g default-shell /usr/local/bin/zsh'
if-shell '[ -x /home/linuxbrew/.linuxbrew/bin/zsh ]'  'set -g default-shell /home/linuxbrew/.linuxbrew/bin/zsh'
if-shell '[ -x /opt/homebrew/bin/zsh ]'               'set -g default-shell /opt/homebrew/bin/zsh'

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g status-position top
#set -g status-right '#($HOME/.local/bin/status.sh)'
#set -g status-right-length 82
set -g status-interval 1

set -g history-limit 5000

set -g focus-events on

set-option -g status-style fg=terminal
set-option -g status-style bg=black
set-option -g pane-active-border-style fg=#8A8AAB,bg=default
set-option escape-time 40

bind-key R source-file ~/.tmux.conf \; display-message "source-file done"

# vi-style copy mode. Set at BOTH global and window scope: tmux otherwise
# auto-detects mode-keys from $EDITOR/$VISUAL when a window is created, and on
# the Linux VDI (no vi-ish $EDITOR) that detection picks `emacs`, overriding a
# bare `setw -g mode-keys vi` and breaking the V / y / Enter copy bindings.
set -g mode-keys vi
setw -g mode-keys vi

# Cross-platform copy.
#   macOS / iTerm2: OSC 52 escape sequence carries the selection to the
#   terminal's clipboard (set-clipboard on). Works over SSH too.
#   Linux: OSC 52 support is terminal-dependent, so also pipe the selection
#   straight to the system clipboard. Prefer wl-copy under Wayland, else xclip
#   under X11. copy-pipe-and-cancel still sets the tmux buffer + emits OSC 52,
#   so every path stays populated and the default (OSC 52) survives on hosts
#   with neither tool (e.g. headless / minimal remotes).
set -g set-clipboard on
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
# Wayland: wl-copy (checked first so it wins on Wayland sessions).
if-shell '[ -n "$WAYLAND_DISPLAY" ] && command -v wl-copy >/dev/null' \
  "bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'wl-copy' ; \
   bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'"
# X11: xclip (only when not on Wayland, so a Wayland box with xclip installed
# for XWayland compat doesn't get overridden).
if-shell '[ -z "$WAYLAND_DISPLAY" ] && command -v xclip >/dev/null' \
  "bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in' ; \
   bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"
